# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
site_url: https://didymus.info
display_url: https://beta.didymus.info
backend:
  name: github
  repo: "projectdidymus/didymus.info"
  branch: beta
  squash_merges: true
i18n:
  structure: multiple_folders
  locales: [nl, en]
  default_locale: nl
  initial_locales: [nl]
media_folder: static/img
public_folder: /img
singletons:
  - name: abbreviations
    label: Afkortingen
    file: data/abbr.yml
    i18n: false
    format: yml
    fields:
      - label: Afkortingen
        label_singular: Afkorting
        name: abbreviations
        widget: list
        root: true
        fields:
          - label: Afkorting
            name: id
            widget: string
          - label: Volledige tekst
            name: long
            widget: string
collections:
  - name: about
    label: Over
    format: toml-frontmatter
    folder: content
    path: "about/{{slug}}"
    create: false
    delete: false
    index_file: true
    i18n: true
    fields: &content_fields
      - label: Titel
        name: title
        widget: string
        i18n: true
      - label: Omschrijving
        name: description
        widget: text
        i18n: true
      - label: Datum
        name: date
        widget: datetime
        default: "{{now}}"
        # `format` controls the stored value; without it Sveltia's smol-toml emits a
        # bare datetime with a `.000` suffix Hugo can mishandle (sveltia-cms#382).
        # Force a date-only string so TOML output stays Hugo-parseable.
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
      - label: Concept
        name: draft
        widget: boolean
        default: true
      - label: Tags
        name: tags
        required: false
        widget: list
      - label: Inhoud
        name: body
        widget: markdown
        i18n: true
      - label: Gewicht
        name: weight
        widget: number
        value_type: int
        min: 1
        max: 100
      - label: "Niet opnemen in zoekresultaten"
        name: searchExclude
        widget: boolean
        default: false
  - name: languages
    label: Grondtalen
    format: toml-frontmatter
    folder: content
    path: "languages/{{slug}}"
    create: true
    delete: false
    index_file: true
    i18n:
      locales: [nl]
    fields: *content_fields
  - name: content
    label: Aangepaste Content
    format: toml-frontmatter
    folder: content
    path: "content/{{slug}}"
    create: false
    delete: false
    index_file: true
    i18n:
      locales: [nl]
    fields: *content_fields
  - name: software
    label: Software & apparatuur
    format: toml-frontmatter
    folder: content
    path: "software/{{slug}}"
    create: false
    delete: false
    index_file: true
    i18n:
      locales: [nl]
    fields: *content_fields
  - name: testimonials
    label: Ervaringen
    format: toml-frontmatter
    folder: content
    path: "testimonials/{{slug}}"
    create: false
    delete: false
    index_file: true
    i18n:
      locales: [nl]
    fields: *content_fields
